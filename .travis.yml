language: python
python:
  - "3.5"
  - "3.5-dev"
  - "nightly"
env:
  - DB=sqlite
  - DB=postgres
before_script:
  - psql -c 'create database schaermu_ch;' -U postgres
  - export TEST_DB=$DB
install:
  - if [[ $DB == postgres ]]; then pip install -q psycopg2; fi
  - pip install -q --user requirements.txt
  - pip install -q --user coveralls
script:
  - coverage run --source=schaermu_ch ./manage.py test
after_success: coveralls
